apiVersion: v1
kind: Namespace
metadata:
  name: trivyhub
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: trivyhub-postgres
  namespace: trivyhub
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trivyhub-postgres
  namespace: trivyhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trivyhub-postgres
  template:
    metadata:
      labels:
        app: trivyhub-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: trivyhub
            - name: POSTGRES_USER
              value: trivyhub
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trivyhub-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "trivyhub"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: trivyhub-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: trivyhub-postgres
  namespace: trivyhub
spec:
  selector:
    app: trivyhub-postgres
  ports:
    - port: 5432
      targetPort: 5432
