name: CI

on:
  push:
    branches-ignore:
      - "gitops/**"
  pull_request:
    branches: ["**"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint --if-present

  # ─── Security ─────────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=critical

  # ─── Build & Push ─────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [lint, security]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set image tag
        id: set-tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=stag" >> $GITHUB_OUTPUT
          fi

      - name: Log in to ghcr.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build & push image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.set-tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          no-cache: true

  # ─── Deploy via GitOps ────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set env
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "values=helm/trivyhub/values-prod.yaml" >> $GITHUB_OUTPUT
            echo "gitops_branch=gitops/prod"             >> $GITHUB_OUTPUT
          else
            echo "values=helm/trivyhub/values-staging.yaml" >> $GITHUB_OUTPUT
            echo "gitops_branch=gitops/staging"             >> $GITHUB_OUTPUT
          fi

      - name: Update image tag in helm values
        run: |
          sed -i "s|tag: .*|tag: \"${{ github.sha }}\"|g" ${{ steps.env.outputs.values }}

      - name: Commit & push to gitops branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp ${{ steps.env.outputs.values }} /tmp/values.yaml
          git fetch origin ${{ steps.env.outputs.gitops_branch }} || true
          git checkout -B ${{ steps.env.outputs.gitops_branch }} origin/${{ steps.env.outputs.gitops_branch }} 2>/dev/null || git checkout -B ${{ steps.env.outputs.gitops_branch }}
          cp /tmp/values.yaml ${{ steps.env.outputs.values }}
          git add ${{ steps.env.outputs.values }}
          git commit -m "chore: deploy → ${{ github.sha }}"
          git push origin ${{ steps.env.outputs.gitops_branch }} --force

  # ─── Healthcheck ──────────────────────────────────────────────────────────────
  healthcheck:
    name: Healthcheck
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Set url
        id: url
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "url=https://trivyhub.cluster.afflair.app/api/healthz" >> $GITHUB_OUTPUT
          else
            echo "url=https://stag.trivyhub.cluster.afflair.app/api/healthz" >> $GITHUB_OUTPUT
          fi

      - name: Wait for ArgoCD sync
        run: |
          for i in $(seq 1 24); do
            if curl -sf ${{ steps.url.outputs.url }}; then
              echo "App is up!"
              exit 0
            fi
            echo "Attempt $i/24 failed, retrying in 10s..."
            sleep 10
          done
          echo "App did not respond after 4 minutes"
          exit 1
