image:
  repository: ghcr.io/trivyhub/trivy-dashboard-web
  tag: "latest"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  host: trivyhub.example.com
  annotations: {}
  tls:
    enabled: false
    secretName: trivyhub-tls

env:
  JWT_SECRET: "change-me-in-production"

postgres:
  enabled: true
  image: postgres:16-alpine
  database: trivyhub
  user: trivyhub
  password: "change-me-in-production"
  storageSize: 5Gi
  storageClass: ""

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
